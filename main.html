<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title></title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
    
  </head>
  <body>
    <h1></h1>

    <div class="score">
      Your Points: 
      <span>0</span>
      <button class="reset">Reset score</button>
    </div>

    <div class="guess-game">
      <div class="game-area">
        <div class="inputs"></div>

        <div class="control">
          <button class="check">Check Word</button>
          <button class="hint"><span></span> Hint</button>
        </div>

        <div class="massege"></div>
      </div>

      <div class="rules">

        <div class="next">
          <button>Next</button>
          
        </div>

        <div class="arrows">
            <h3>You Can Use Arrows</h3>
            <div>
                <div class="arrow">
                    <span class="material-symbols-outlined">
                    line_start_arrow_notch
                    </span>
                    <p>Left</p>
                </div>
                <div class="arrow">
                    <span class="material-symbols-outlined rotate-180">
                    backspace
                    </span>
                    <p>Backspace</p>
                </div>
                <div class="arrow">
                    <span class="material-symbols-outlined rotate-180">
                    line_start_arrow_notch
                    </span>
                    <p>Right</p>
                </div>
            </div>
        </div>

        <div class="key_color">
          <h3>Key Colors</h3>
          <div class="rule">
            <div class="in-place"></div>
            <p>Letter Right and in place</p>
          </div>
          <div class="rule">
            <div class="not-in-place"></div>
            <p>Letter Right and NOT in place</p>
          </div>
          <div class="rule">
            <div class="no"></div>
            <p>Letter wrong</p>
          </div>
        </div>



      </div>
    </div>

    <footer></footer>

    <script src="main.js"></script>
  </body>
</html>
